<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Altar Digital VampySec ⚡️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Cinzel&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Todo tu CSS original aquí – sin cambios, está brutal */
    :root {
      --neon-green: #00ff99;
      --neon-cyan: #00ffff;
      --blood-red: #ff0033;
      --glass-bg: rgba(15, 5, 40, 0.38);
      --shadow-glow: 0 0 20px;
    }
    /* ... pega todo el <style> que tenías ... (lo omito por brevedad, pero cópialo completo) */
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>VampySec Altar</h2>
      <p>Iniciado: <span id="usuario">Iluminado #666</span> ⚡️</p>
      <p>Rol: Abismo Elite</p>
    </div>
    <nav class="sidebar-nav">
      <button class="active" onclick="showSection('duel')"><i class="fas fa-gamepad"></i> Duel Links</button>
      <button onclick="showSection('github')"><i class="fab fa-github"></i> Github Temu</button>
      <button onclick="showSection('descargas')"><i class="fas fa-download"></i> Descargas</button>
      <button onclick="showSection('tools')"><i class="fas fa-tools"></i> Tools / Ritual</button>
      <button onclick="showSection('contacto')"><i class="fas fa-address-book"></i> Contacto</button>
      <button onclick="alert('Ritual completado. Regresa cuando la luna sangre llame.')"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main>
    <div class="welcome">
      <p id="saludo"></p>
    </div>

    <!-- El resto de tus secciones (duel, github, descargas, tools, contacto) exactamente igual -->
    <div id="duel" class="content-card">
      <!-- ... tu contenido de DUEL LINKS ... -->
    </div>

    <div id="github" class="content-card" style="display: none;">
      <!-- ... Github Temu ... -->
    </div>

    <div id="descargas" class="content-card" style="display: none;">
      <h1 class="glitch-title" data-text="DESCARGAS DEL ABISMO">DESCARGAS DEL ABISMO</h1>
      <h2 class="welcome-text" id="welcome-descargas"></h2>
      <div class="grid">
        <!-- Todas tus cards de descargas – links a Mega/MediaFire siguen funcionando -->
      </div>
    </div>

    <div id="tools" class="content-card" style="display: none;">
      <!-- ... RITUAL CENTRAL ... -->
    </div>

    <div id="contacto" class="content-card" style="display: none;">
      <!-- ... CONTACTO ... -->
    </div>

    <footer>
      © 2026 VampySec Nexus Silence ⚡️ | #haciendomagiacomosiempre
    </footer>
  </main>

  <script>
    // Saludo por hora (reemplaza PHP)
    const hora = new Date().getHours();
    let saludo = "";
    if (hora < 12) saludo = "🌞 Buenos días, iniciado.";
    else if (hora < 18) saludo = "🌤 Buenas tardes, iniciado.";
    else saludo = "🌙 Buenas noches, iniciado.";
    document.getElementById("saludo").textContent = saludo;

    // Función showSection (igual)
    function showSection(tabId) {
      document.querySelectorAll('.content-card').forEach(tab => tab.style.display = 'none');
      document.getElementById(tabId).style.display = 'block';
      document.querySelectorAll('.sidebar-nav button').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.sidebar-nav button[onclick*="'${tabId}'"]`).classList.add('active');
      if (tabId === 'descargas') typeAbismo();
      if (tabId === 'tools') typeRitual();
    }

    // Tus funciones typeAbismo y typeRitual (iguales)
    function typeAbismo() {
      const text = "El abismo te regala sus tesoros, Iluminado... Descarga con poder, pero recuerda: todo tiene un precio 𓆩";
      let i = 0;
      const el = document.getElementById('welcome-descargas');
      el.innerHTML = '';
      const interval = setInterval(() => {
        if (i < text.length) {
          el.innerHTML += text.charAt(i);
          i++;
        } else clearInterval(interval);
      }, 60);
    }

    function typeRitual() {
      const text = "Bienvenido al abismo, Iluminado Vampy 𓆩... El ritual te reclama. No seas manco, domina o perece.";
      let i = 0;
      const el = document.getElementById('welcome-tools');
      el.innerHTML = '';
      const interval = setInterval(() => {
        if (i < text.length) {
          el.innerHTML += text.charAt(i);
          i++;
        } else clearInterval(interval);
      }, 55);
    }

    // Default: Duel
    showSection('duel');
  </script>
</body>
</html>
